filebeat.inputs:
  - type: docker
    combine_partial: true
    containers:
      path: "/usr/share/dockerlogs/data"
      stream: "stdout"
      ids:
        - "*"
    exclude_files: ['\.gz$']
    ignore_older: 10m

processors:
  # Декодируем JSON-логи приложения в поля Elasticsearch
  - decode_json_fields:
      fields: ["log", "message", "msg"]
      target: ""
      overwrite_keys: true
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  # Исключаем логи инфраструктурных контейнеров, чтобы избежать feedback loop
  - drop_event:
      when:
        or:
          - contains:
              container.name: "logstash"
          - contains:
              container.name: "filebeat"
          - contains:
              container.name: "elasticsearch"
          - contains:
              container.name: "kibana"
          - contains:
              container.name: "prometheus"
          - contains:
              container.name: "grafana"
  - drop_fields:
      fields: ["container.labels.io_buildpacks_build_metadata", "container.labels.io_buildpacks_lifecycle_metadata", "container.labels.io_buildpacks_stack_id"]

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false

# Отправляем логи в Logstash
output.logstash:
  hosts: ["logstash"]

# Логи самого Filebeat — только в файл, чтобы не попадали в Docker stdout
logging.level: info
logging.to_files: false
logging.to_syslog: false
logging.metrics.enabled: false
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
ssl.verification_mode: none