spring.datasource.url=jdbc:postgresql://postgresdb:5432/productsdb
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.batch.jdbc.initialize-schema=always
spring.jpa.hibernate.ddl-auto=create-drop
spring.batch.jdbc.table-prefix=BATCH_
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-all.sql

# Имя приложения — используется в logback contextName и метках Prometheus
spring.application.name=batch-processing

# Открываем все actuator эндпоинты, включая /actuator/prometheus
management.endpoints.web.exposure.include=beans,env,health,info,metrics,mappings,prometheus
management.endpoint.health.show-details=always
management.health.probes.enabled=true

logging.level.com.example.batchprocessing=DEBUG